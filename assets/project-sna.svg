    <rect width="50" height="18" rx="9" stroke="#1f6feb" stroke-width="0.8" opacity="0.3"/>
    <text x="25" y="12" fill="#58a6ff" text-anchor="middle" font-weight="500">Python</text>
    
    <!-- NetworkX -->
    <g transform="translate(56, 0)">
      <rect width="60" height="18" rx="9" fill="#238636" opacity="0.15"/>
      <rect width="60" height="18" rx="9" stroke="#238636" stroke-width="0.8" opacity="0.3"/>
      <text x="30" y="12" fill="#3fb950" text-anchor="middle" font-weight="500">NetworkX</text>
    </g>
    
    <!-- NLP / ABSA -->
