    <text x="25" y="12" fill="#0969da" text-anchor="middle" font-weight="600">Python</text>
    
    <!-- NetworkX -->
    <g transform="translate(56, 0)">
      <rect width="60" height="18" rx="9" fill="#dafbe1"/>
      <rect width="60" height="18" rx="9" stroke="#1a7f37" stroke-width="0.8" opacity="0.3"/>
      <text x="30" y="12" fill="#1a7f37" text-anchor="middle" font-weight="600">NetworkX</text>
    </g>
    
    <!-- NLP / ABSA -->
