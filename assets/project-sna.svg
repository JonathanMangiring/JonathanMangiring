    <tspan x="25" dy="16">Sentiment Analysis on e-commerce reviews.</tspan>
  </text>
  
  <!-- Tech Stack Badges -->
  <g transform="translate(25, 95)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10">
